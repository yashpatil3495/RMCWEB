<script>
(function() {
    const cv  = document.getElementById('mathBg');
    if (!cv) return;
    const ctx = cv.getContext('2d');
    let W, H, pts = [], objs = [], raf;

    const SYMBOLS = [
        '\u03b1','\u03b2','\u03b3','\u03b4','\u03b5','\u03b6','\u03b7','\u03b8','\u03ba','\u03bb',
        '\u03bc','\u03bd','\u03be','\u03c0','\u03c1','\u03c3','\u03c4','\u03c5','\u03c6','\u03c7',
        '\u03c8','\u03c9','\u0393','\u0394','\u039b','\u03a3','\u03a6','\u03a8','\u03a9','\u03a0',
        '\u222b','\u222c','\u222d','\u222e','\u2202','\u2207','\u2211','\u220f','\u221e','\u2248',
        '\u2243','\u224d','\u2261','\u2260','\u2264','\u2265','\u226a','\u226b','\u221d','\u2118',
        '\u2200','\u2203','\u2204','\u2208','\u2209','\u2286','\u2287','\u2282','\u2283','\u2229',
        '\u222a','\u2295','\u2297','\u2299','\u22a5','\u2234','\u2235','\u221a','\u221b','\u221c',
        '\u2220','\u22be','\u27c2','\u2245','\u223c','\u00b1','\u00d7','\u00f7'
    ];

    const FORMULAS = [
        'E = mc\u00b2','a\u00b2 + b\u00b2 = c\u00b2','F = ma','PV = nRT',
        '\u222bf(x)dx','d/dx(e\u02e3) = e\u02e3','d/dx(sin x) = cos x',
        '\u2202\u00b2u / \u2202t\u00b2','lim(x\u21920) sin(x)/x = 1',
        '\u2211n = n(n+1)/2','\u2211n\u00b2 = n(n+1)(2n+1)/6',
        '\u2211(1/n\u00b2) = \u03c0\u00b2/6',
        'sin\u00b2\u03b8 + cos\u00b2\u03b8 = 1','cos(2\u03b8) = 1 - 2sin\u00b2\u03b8',
        'tan\u03b8 = sin\u03b8 / cos\u03b8','e^(i\u03b8) = cos\u03b8 + i sin\u03b8',
        'sin(A+B) = sinA cosB + cosA sinB',
        'P(A|B) = P(B|A)P(A)/P(B)','E[X] = x P(X=x)',
        'Var(X) = E[X\u00b2] - (E[X])\u00b2',
        'det(A) = ad - bc','Ax = \u03bbx','tr(A) = a\u1d62\u1d62',
        '\u0393(n+1) = n!','\u03b6(s) = (1/n\u02e2)',
        'a \u2261 b (mod n)',
        'F = Gm\u2081m\u2082/r\u00b2','V = \u03c0r\u00b2h','A = 4\u03c0r\u00b2',
        '\u2207\u00b2\u03c6 = 0','c\u00b2 = a\u00b2 + b\u00b2 - 2ab cosC',
        'z = re^(i\u03b8)','i\u00b2 = j\u00b2 = k\u00b2 = -1',
        'x\u2099\u208a\u2081 = rx\u2099(1 - x\u2099)',
        'H = -p\u1d62 log(p\u1d62)',
        'sinh(x) = (e\u02e3 - e^\u207bx)/2',
        '\u222e E dA = Q/\u03b5\u2080',
        '\u03c3 = (x-\u03bc)\u00b2/n',
        'eⁱ\u03c0 + 1 = 0'
    ];

    const GOLD  = (a) => 'rgba(192,160,96,' + a + ')';
    const CREAM = (a) => 'rgba(220,200,160,' + a + ')';
    const BLUE  = (a) => 'rgba(140,180,220,' + a + ')';
    const rand  = (a, b) => a + Math.random() * (b - a);
    const pick  = (arr) => arr[Math.floor(Math.random() * arr.length)];

    function buildScene() {
        pts  = [];
        objs = [];
        var isMobile       = window.innerWidth < 768;
        var PARTICLE_COUNT = isMobile ? 50  : 90;
        var SYMBOL_COUNT   = isMobile ? 28  : 55;
        var FORMULA_COUNT  = isMobile ? 14  : 30;
        var ORBIT_COUNT    = isMobile ? 3   : 6;

        for (var i = 0; i < PARTICLE_COUNT; i++) {
            pts.push({ x:rand(0,W), y:rand(0,H), vx:rand(-0.35,0.35), vy:rand(-0.35,0.35),
                       r:rand(1.0,2.8), ph:rand(0,Math.PI*2), spd:rand(0.01,0.04) });
        }
        for (var i = 0; i < SYMBOL_COUNT; i++) {
            objs.push({ type:'sym', x:rand(0,W), y:rand(0,H), vx:rand(-0.28,0.28), vy:rand(-0.28,0.28),
                        sym:pick(SYMBOLS), size:rand(13,40), alpha:rand(0.18,0.70),
                        ph:rand(0,Math.PI*2), spd:rand(0.008,0.025),
                        rot:rand(-0.5,0.5), rotSpd:rand(-0.005,0.005),
                        col: Math.random() < 0.85 ? 'gold' : 'blue' });
        }
        for (var i = 0; i < FORMULA_COUNT; i++) {
            objs.push({ type:'formula', x:rand(0,W), y:rand(0,H), vx:rand(-0.18,0.18), vy:rand(-0.18,0.18),
                        text:pick(FORMULAS), size:rand(10,16), alpha:rand(0.15,0.55),
                        ph:rand(0,Math.PI*2), spd:rand(0.005,0.018) });
        }
        for (var i = 0; i < ORBIT_COUNT; i++) {
            objs.push({ type:'orbit', cx:rand(W*0.05,W*0.95), cy:rand(H*0.05,H*0.95),
                        rx:rand(25,100), ry:rand(18,60),
                        angle:rand(0,Math.PI*2), spd:rand(0.003,0.014), alpha:rand(0.06,0.18) });
        }
    }

    function wrap(o) {
        var pad = 60;
        if (o.x < -pad)    o.x = W + pad;
        if (o.x > W + pad) o.x = -pad;
        if (o.y < -pad)    o.y = H + pad;
        if (o.y > H + pad) o.y = -pad;
    }

    function draw() {
        ctx.clearRect(0,0,W,H);
        ctx.fillStyle = '#0a0a0f';
        ctx.fillRect(0,0,W,H);

        var grd = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.65);
        grd.addColorStop(0,'rgba(192,160,96,0.045)');
        grd.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle = grd;
        ctx.fillRect(0,0,W,H);

        for (var i = 0; i < pts.length; i++) {
            var p = pts[i];
            p.x += p.vx; p.y += p.vy; p.ph += p.spd;
            if (p.x < 0 || p.x > W) p.vx *= -1;
            if (p.y < 0 || p.y > H) p.vy *= -1;
        }

        var CD = 110;
        for (var i = 0; i < pts.length; i++) {
            for (var j = i+1; j < pts.length; j++) {
                var dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
                var d  = Math.sqrt(dx*dx + dy*dy);
                if (d < CD) {
                    ctx.strokeStyle = GOLD(0.22*(1-d/CD));
                    ctx.lineWidth   = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(pts[i].x, pts[i].y);
                    ctx.lineTo(pts[j].x, pts[j].y);
                    ctx.stroke();
                }
            }
        }

        for (var i = 0; i < pts.length; i++) {
            var p = pts[i];
            ctx.fillStyle = GOLD(0.4 + 0.55*Math.sin(p.ph));
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
            ctx.fill();
        }

        for (var i = 0; i < objs.length; i++) {
            var o = objs[i];
            if (o.type === 'sym') {
                o.x += o.vx; o.y += o.vy; o.ph += o.spd; o.rot += o.rotSpd;
                wrap(o);
                var a = o.alpha*(0.55+0.45*Math.sin(o.ph));
                ctx.save();
                ctx.translate(o.x, o.y);
                ctx.rotate(o.rot);
                ctx.fillStyle    = o.col === 'gold' ? GOLD(a) : BLUE(a);
                ctx.font         = o.size + "px Georgia,'Times New Roman',serif";
                ctx.textAlign    = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(o.sym, 0, 0);
                ctx.restore();
            } else if (o.type === 'formula') {
                o.x += o.vx; o.y += o.vy; o.ph += o.spd;
                wrap(o);
                var a = o.alpha*(0.5+0.5*Math.sin(o.ph));
                ctx.fillStyle    = CREAM(a);
                ctx.font         = o.size + "px 'Courier New',Courier,monospace";
                ctx.textAlign    = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(o.text, o.x, o.y);
            } else if (o.type === 'orbit') {
                o.angle += o.spd;
                ctx.strokeStyle = GOLD(o.alpha);
                ctx.lineWidth   = 0.75;
                ctx.beginPath();
                ctx.ellipse(o.cx, o.cy, o.rx, o.ry, o.angle*0.25, 0, Math.PI*2);
                ctx.stroke();
                var px = o.cx + o.rx*Math.cos(o.angle);
                var py = o.cy + o.ry*Math.sin(o.angle);
                ctx.fillStyle = GOLD(0.6);
                ctx.beginPath();
                ctx.arc(px, py, 2.2, 0, Math.PI*2);
                ctx.fill();
            }
        }
        raf = requestAnimationFrame(draw);
    }

    function resize() {
        W = cv.width  = window.innerWidth;
        H = cv.height = window.innerHeight;
        if (raf) cancelAnimationFrame(raf);
        buildScene();
        raf = requestAnimationFrame(draw);
    }
    window.addEventListener('resize', resize);
    resize();
})();
</script>
</body>
</html>
